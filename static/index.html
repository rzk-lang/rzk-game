<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rzk Game</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif;
           max-width: 760px; margin: 1rem auto; padding: 0 1rem; }
    h2 { margin-bottom: .2rem; }
    h3 { margin: 1rem 0 .3rem; font-size: 1rem; color: #444; }
    pre { background: #f5f5f5; padding: .6rem; border-radius: 6px;
          overflow-x: auto; white-space: pre-wrap; }
    .goal { background: #eef; }
    /* The prelude is collapsed by default (a <details>) and syntax-highlighted
       with the same .tok-* classes as the editor; #555 is the plain-token base. */
    .prelude-wrap { margin: .3rem 0 .6rem; }
    .prelude-wrap summary { cursor: pointer; font-weight: 600; color: #444;
                            font-size: .95rem; }
    .prelude { color: #555; font-size: .85rem; margin-top: .3rem;
               white-space: pre-wrap; overflow-wrap: break-word; }
    /* L1 editor: a transparent textarea stacked over a highlighted <pre>.
       Both share identical metrics so the coloured layer aligns with typing. */
    .editor-wrap { position: relative; }
    .editor, .editor-hl {
      margin: 0; width: 100%; box-sizing: border-box;
      font-family: ui-monospace, monospace; font-size: 1rem; line-height: 1.45;
      padding: .5rem; border: 1px solid #ccc;
      white-space: pre-wrap; overflow-wrap: break-word; tab-size: 2;
    }
    .editor {
      position: relative; z-index: 1; resize: vertical;
      color: transparent; background: transparent; caret-color: #000;
    }
    .editor-hl {
      position: absolute; inset: 0; z-index: 0; overflow: hidden;
      pointer-events: none; border-color: transparent; background: #fff;
      color: #222;
    }
    .tok-kw      { color: #8250df; font-weight: 600; }
    .tok-hole    { color: #fff; background: #d6336c; border-radius: 3px; }
    .tok-comment { color: #6a737d; font-style: italic; }
    .tok-op      { color: #0a7d62; }
    .levels { margin: .2rem 0 .4rem; display: flex; flex-wrap: wrap; gap: .4rem; }
    .levels button { margin: 0; background: #f0f0f0; border: 1px solid #ccc;
                     border-radius: 6px; cursor: pointer; }
    .levels button.current { background: #cde; border-color: #79c; font-weight: 600; }
    .levels button.solved { background: #e7f7e7; border-color: #7c7; color: #285028; }
    .levels button.solved.current { background: #cfe9cf; border-color: #4a4; }
    .progress { margin: 0 0 .8rem; font-size: .85rem; color: #777; }
    .progress.done { color: #2a7a2a; font-weight: 600; }
    .advance { margin: .5rem 0; }
    .advance button { background: #dfd; border: 1px solid #7c7; border-radius: 6px;
                      cursor: pointer; }
    .all-done { margin: .5rem 0; padding: .6rem; background: #dff5df;
                border: 1px solid #7c7; border-radius: 6px; font-weight: 600;
                color: #285028; }
    .buttons { margin: .5rem 0; }
    .actions { margin: .3rem 0; display: flex; flex-wrap: wrap; gap: .4rem; }
    button { font-size: 1rem; padding: .4rem .9rem; margin-right: .5rem; }
    /* Two-part move button: a colour-coded kind chip + a syntax-highlighted
       filler term. The button itself is a flex container with no padding; the
       two parts supply their own. */
    button.refine { display: inline-flex; align-items: stretch; gap: 0;
                    padding: 0; margin: 0; overflow: hidden;
                    background: #fff; border: 1px solid #99c; border-radius: 6px;
                    cursor: pointer; font-size: .95rem; }
    button.refine .move-kind { display: flex; align-items: center;
                    padding: .35rem .55rem; color: #fff; font-weight: 600;
                    font-family: system-ui, sans-serif; font-size: .72rem;
                    text-transform: uppercase; letter-spacing: .04em; }
    button.refine .kind-intro { background: #2a7a2a; }   /* introductions */
    button.refine .kind-give  { background: #8250df; }   /* eliminations */
    button.refine .move-term { display: flex; align-items: center;
                    padding: .35rem .6rem; color: #222;
                    font-family: ui-monospace, monospace; white-space: pre; }
    .err { background: #fdd; padding: .6rem; border-radius: 6px; }
    .err p { margin: 0 0 .4rem; }
    .errdump { max-height: 14rem; overflow: auto; margin: 0;
               background: #fff3f3; font-size: .85rem; white-space: pre; }
    .ok  { background: #dfd; padding: .6rem; border-radius: 6px; }
    .ok pre { background: transparent; padding: 0; margin: 0; font-weight: 600; }
    .ok p { margin: .4rem 0 0; }
    .hole { background: #ffd; border: 1px solid #e0d28a; border-radius: 6px;
            padding: .5rem .6rem; margin: .5rem 0; }
    .hole-head { font-weight: 600; margin-bottom: .3rem; }
    .hole-panel { margin: .35rem 0; }
    .hole-label { font-size: .7rem; text-transform: uppercase;
                  letter-spacing: .04em; color: #877a3a; margin-bottom: .15rem; }
    .hole .goal { background: #eef; margin: 0; }
    .ctx { list-style: none; margin: 0; padding: 0;
           font-family: ui-monospace, monospace; font-size: .9rem; }
    .ctx .name { color: #225; }
    .ctx .type { color: #555; }
    .muted { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <script src="index.js" type="module"></script>
</body>
</html>
