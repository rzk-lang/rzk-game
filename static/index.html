<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rzk Game</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif;
           max-width: 760px; margin: 1rem auto; padding: 0 1rem; }
    h2 { margin-bottom: .2rem; }
    h3 { margin: 1rem 0 .3rem; font-size: 1rem; color: #444; }
    pre { background: #f5f5f5; padding: .6rem; border-radius: 6px;
          overflow-x: auto; white-space: pre-wrap; }
    .goal { background: #eef; }
    .prelude { color: #555; font-size: .85rem; }
    .editor { width: 100%; font-family: ui-monospace, monospace;
              font-size: 1rem; padding: .5rem; box-sizing: border-box; }
    .buttons { margin: .5rem 0; }
    button { font-size: 1rem; padding: .4rem .9rem; margin-right: .5rem; }
    .err { background: #fdd; }
    .ok  { background: #dfd; padding: .6rem; border-radius: 6px; }
    .hole { background: #ffd; }
    .inventory { font-family: ui-monospace, monospace; font-size: .9rem; }
  </style>
</head>
<body>
  <script src="index.js" type="module"></script>
</body>
</html>
